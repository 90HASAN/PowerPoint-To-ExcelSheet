<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PPT to Excel Converter</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #FFF2DB;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}

.card {
  background: #FFFAF3;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(246, 36, 64, 0.12);
  width: 420px;
  max-width: 90vw;
}

h1 {
  font-size: 1.4rem;
  margin-bottom: 8px;
  color: #F62440;
}

p.sub {
  color: #7a5c50;
  margin-top: 0;
  margin-bottom: 24px;
  font-size: 0.9rem;
}

.dropzone {
  border: 2px dashed #F62440;
  border-radius: 12px;
  padding: 28px 16px;
  text-align: center;
  color: #F62440;
  background: #FFE5BF;

  width: 100%;
  box-sizing: border-box;
  min-height: 120px;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.dropzone.dragover {
  background: #FFD6A5;
  transform: scale(1.02);
}

.dropzone input {
  display: none;
}

#file-list {
  margin-top: 14px;
  font-size: 0.85rem;
  color: #6b4f45;
  max-height: 100px;
  overflow-y: auto;
}

button {
  margin-top: 22px;
  width: 100%;
  padding: 12px;
  background: #F62440;
  color: #FFFAF3;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #d91e35;
}

button:disabled {
  background: #f6a4ad;
  cursor: not-allowed;
}

.flash {
  background: #FFE5BF;
  color: #F62440;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 18px;
  font-size: 0.85rem;
}

/* Tablets */
@media (max-width: 768px) {

  body {
    padding: 20px;
  }

  .card {
    width: 90%;
    padding: 30px 25px;
    border-radius: 14px;
  }

  h1 {
    font-size: 1.25rem;
  }

  p.sub {
    font-size: 0.85rem;
  }

  .dropzone {
    padding: 25px 12px;
    min-height: 100px;
  }

  }

    padding: 15px;
  }

  .card {
    width: 100%;
    padding: 25px 18px;
  }

  h1 {
    font-size: 1.1rem;
    text-align: center;
  }

  p.sub {
    text-align: center;
    line-height: 1.4;
  }

  .dropzone {
    font-size: 0.9rem;

  }

  #file-list {

  }

  button {

  }

</style>
</head>
<body>
  <div class="card">
    <h1>PPT &rarr; Excel Converter</h1>
    <p class="sub">Upload one or more .pptx files and click Convert to download the extracted data as Excel.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form id="convert-form" action="/convert" method="post" enctype="multipart/form-data">
      <label class="dropzone" id="dropzone" for="ppt_files">
        <div>Click to choose .pptx file(s)<br>or drag & drop here</div>
        <input type="file" id="ppt_files" name="ppt_files" accept=".pptx" multiple>
      </label>
      <div id="file-list"></div>
      <button type="submit" id="submit-btn" disabled>Convert</button>
      <div class="spinner" id="spinner">Converting… please wait</div>
    </form>
  </div>

<script>
  const dropzone = document.getElementById('dropzone');
  const input = document.getElementById('ppt_files');
  const fileList = document.getElementById('file-list');
  const submitBtn = document.getElementById('submit-btn');
  const form = document.getElementById('convert-form');
  const spinner = document.getElementById('spinner');

  function updateFileList() {
    const files = input.files;
    if (files.length === 0) {
      fileList.textContent = '';
      submitBtn.disabled = true;
      return;
    }
    fileList.innerHTML = Array.from(files).map(f => `• ${f.name}`).join('<br>');
    submitBtn.disabled = false;
  }

  input.addEventListener('change', updateFileList);

  ['dragover'].forEach(evt =>
    dropzone.addEventListener(evt, e => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    })
  );
  ['dragleave', 'drop'].forEach(evt =>
    dropzone.addEventListener(evt, e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
    })
  );
  dropzone.addEventListener('drop', e => {
    input.files = e.dataTransfer.files;
    updateFileList();
  });

  form.addEventListener('submit', () => {
    submitBtn.disabled = true;
    spinner.style.display = 'block';
  });
</script>
</body>
</html>
